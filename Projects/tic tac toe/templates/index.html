<!DOCTYPE html>
<html>
<head>
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>❌⭕ Tic Tac Toe</h1>

<div class="board" id="board">
    <div class="cell" onclick="play(this, 0)"></div>
    <div class="cell" onclick="play(this, 1)"></div>
    <div class="cell" onclick="play(this, 2)"></div>
    <div class="cell" onclick="play(this, 3)"></div>
    <div class="cell" onclick="play(this, 4)"></div>
    <div class="cell" onclick="play(this, 5)"></div>
    <div class="cell" onclick="play(this, 6)"></div>
    <div class="cell" onclick="play(this, 7)"></div>
    <div class="cell" onclick="play(this, 8)"></div>
</div>

<h2 id="status">Player X's Turn</h2>
<button onclick="resetGame()">Restart</button>

<script>
let board = ["", "", "", "", "", "", "", "", ""];
let currentPlayer = "X";
let gameOver = false;

const winPatterns = [
    [0,1,2], [3,4,5], [6,7,8],
    [0,3,6], [1,4,7], [2,5,8],
    [0,4,8], [2,4,6]
];

function play(cell, index) {
    if (board[index] !== "" || gameOver) return;

    board[index] = currentPlayer;
    cell.innerText = currentPlayer;

    if (checkWin()) {
        document.getElementById("status").innerText = currentPlayer + " Wins 🎉";
        gameOver = true;
        return;
    }

    if (!board.includes("")) {
        document.getElementById("status").innerText = "It's a Draw 😐";
        gameOver = true;
        return;
    }

    currentPlayer = currentPlayer === "X" ? "O" : "X";
    document.getElementById("status").innerText = "Player " + currentPlayer + "'s Turn";
}

function checkWin() {
    return winPatterns.some(pattern => {
        return pattern.every(i => board[i] === currentPlayer);
    });
}

function resetGame() {
    board = ["", "", "", "", "", "", "", "", ""];
    document.querySelectorAll(".cell").forEach(cell => cell.innerText = "");
    currentPlayer = "X";
    gameOver = false;
    document.getElementById("status").innerText = "Player X's Turn";
}
</script>

</body>
</html>
